---
- name: Configure {{ service_name }}
  hosts: "{{ target_hosts | default('all') }}"
  become: true
  gather_facts: true

  vars:
    service_name: "{{ service_name }}"

  pre_tasks:
    - name: Confirm target operating system
      ansible.builtin.debug:
        msg: "Running against {{ inventory_hostname }} on {{ ansible_distribution }} {{ ansible_distribution_version }}"

  tasks:
    - name: Placeholder task
      ansible.builtin.debug:
        msg: "Add implementation tasks here."

  handlers:
    - name: Restart service
      ansible.builtin.service:
        name: "{{ service_name }}"
        state: restarted
